<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Хоккей Дуэль | Счёт на поле | Компактно</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a2f2a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, 'Segoe UI', sans-serif;
            touch-action: none;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* МЕНЮ */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #071f1be6;
            backdrop-filter: blur(12px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .menu-card {
            background: #0d2e27;
            border-radius: 40px;
            padding: 20px 18px;
            width: 100%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid #ffd96666;
        }

        .menu-title {
            font-size: 1.6rem;
            font-weight: 800;
            color: #ffecb3;
            margin-bottom: 10px;
        }

        .coins {
            background: #00000066;
            border-radius: 60px;
            padding: 5px 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 16px;
            font-weight: bold;
            font-size: 1.2rem;
            color: #ffd966;
        }

        .mode-btn {
            background: #ffcd7e;
            border: none;
            font-size: 0.95rem;
            font-weight: bold;
            padding: 9px 14px;
            border-radius: 50px;
            margin: 5px 0;
            width: 100%;
            color: #1f3d36;
            box-shadow: 0 3px 0 #a05e15;
            transition: 0.05s linear;
            cursor: pointer;
        }

        .mode-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #a05e15; }

        .difficulty {
            display: flex;
            gap: 8px;
            margin: 10px 0;
        }
        .difficulty button {
            flex: 1;
            background: #3f7b6b;
            color: white;
            border: none;
            padding: 6px 4px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.75rem;
        }
        .difficulty .active-diff { background: #ffb347; color: #1f3d36; box-shadow: inset 0 0 0 2px #fff2c9; }

        .back-btn { background: #5f5f5f; box-shadow: 0 3px 0 #2a2a2a; margin-top: 10px; }

        /* ИГРОВОЙ ЭКРАН — поле меньше, счёт нарисован на canvas */
        .game-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            background: #0a1f1a;
            padding: 6px;
        }

        .game-card {
            background: transparent;
            padding: 0;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background: #1b4d3e;
            border-radius: 20px;
            width: auto;
            height: 98%;
            max-height: 98%;
            touch-action: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .instruction {
            position: fixed;
            bottom: 8px;
            left: 0;
            right: 0;
            margin: 0 auto;
            width: fit-content;
            font-size: 0.55rem;
            color: #b9f6e6;
            text-align: center;
            background: #071f1bcc;
            border-radius: 30px;
            padding: 4px 12px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            z-index: 10;
        }

        .reset-btn-abs {
            position: fixed;
            top: 8px;
            right: 8px;
            background: #ffcd7e;
            border: none;
            font-size: 0.65rem;
            padding: 5px 12px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            z-index: 20;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        @media (orientation: portrait) { .orientation-warning { display: flex; } }
        .orientation-warning { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:#000000dd; z-index:200; justify-content:center; align-items:center; color:white; font-size:0.9rem; flex-direction:column; gap:10px; text-align:center; padding:20px; }
    </style>
</head>
<body>
<div class="orientation-warning" id="orientWarn">🔄 Поверните телефон горизонтально<br>для игры вдвоём</div>
<div class="menu-overlay" id="menuOverlay">
    <div class="menu-card">
        <div class="menu-title">🏒 ХОККЕЙ ДУЭЛЬ 🏒</div>
        <div class="coins" id="coinDisplay">🪙 0</div>
        <button class="mode-btn" data-mode="pvp">👥 ИГРОК 1 vs ИГРОК 2</button>
        <button class="mode-btn" data-mode="pve">🤖 ИГРОК vs БОТ</button>
        <div class="difficulty" id="diffPanel" style="display: none;">
            <button data-diff="easy">🍃 ЛЁГКИЙ</button>
            <button data-diff="medium">⚡ СРЕДНИЙ</button>
            <button data-diff="hard">🔥 СЛОЖНЫЙ</button>
        </div>
        <button class="mode-btn back-btn" id="closeMenuBtn">▶ СТАРТ</button>
    </div>
</div>

<div class="game-wrapper" id="gameWrapper" style="display: none;">
    <div class="game-card">
        <canvas id="hockeyCanvas" width="780" height="400" style="width:100%; height:auto; max-width:780px; aspect-ratio:780/400"></canvas>
    </div>
    <button class="reset-btn-abs" id="inGameReset">НОВЫЙ МАТЧ</button>
    <div class="instruction" id="gameHint">👆 Нажми на свою клюшку и веди</div>
</div>

<script>
    (function(){
        // ---------- УМЕНЬШЕННОЕ ПОЛЕ (780x400) ----------
        const CW = 780;
        const CH = 400;
        
        const canvas = document.getElementById('hockeyCanvas');
        canvas.width = CW; canvas.height = CH;
        const ctx = canvas.getContext('2d');
        
        // ---------- ИГРОВЫЕ ПАРАМЕТРЫ (адаптированы под меньший размер) ----------
        const PADDLE_RADIUS = 34;
        const PUCK_RADIUS = 14;
        
        let puck = { x: CW/2, y: CH/2, vx: 0, vy: 0, radius: PUCK_RADIUS };
        let leftPaddle = { x: 110, y: CH/2, radius: PADDLE_RADIUS };
        let rightPaddle = { x: CW - 110, y: CH/2, radius: PADDLE_RADIUS };
        
        // Счёт матча
        let leftRounds = 0;
        let rightRounds = 0;
        let currentRoundNumber = 1;
        const MAX_ROUNDS = 5;
        let matchWinner = null;
        let gameActive = true;
        let goalCooldown = 0;
        const GOAL_COOLDOWN_MAX = 30;
        
        let gameMode = 'pvp';
        let botDifficulty = 'medium';
        let coins = 0;
        
        // Механика готовности
        let leftPlayerReady = false;
        let rightPlayerReady = (gameMode === 'pve');
        let gameReady = false;
        
        // Таймер для авт-сброса
        let stuckTimer = 0;
        const STUCK_TIMEOUT = 90;
        
        function resetStuckTimer() { stuckTimer = 0; }
        
        function resetPuckToPlayerSide() {
            puck.x = CW/2;
            puck.y = CH/2;
            let angle = Math.PI;
            let randomY = (Math.random() - 0.5) * 1.2;
            let spd = 5.2;
            puck.vx = Math.cos(angle) * spd;
            puck.vy = randomY * 3.0;
            let totalSpd = Math.hypot(puck.vx, puck.vy);
            if(totalSpd > MAX_SPEED) {
                puck.vx = (puck.vx / totalSpd) * MAX_SPEED;
                puck.vy = (puck.vy / totalSpd) * MAX_SPEED;
            }
            stuckTimer = 0;
            gameHintSpan.innerText = "🎯 Шайба к тебе!";
            setTimeout(() => {
                if (gameReady && gameActive) gameHintSpan.innerText = "Веди клюшку";
            }, 1200);
        }
        
        function checkStuckPuck() {
            if (!gameReady) return;
            if (goalCooldown > 0) return;
            let speed = Math.abs(puck.vx) + Math.abs(puck.vy);
            if (speed < 0.8) {
                stuckTimer++;
                if (stuckTimer >= STUCK_TIMEOUT) {
                    resetPuckToPlayerSide();
                }
            } else {
                stuckTimer = 0;
            }
        }
        
        // Управление
        let activeDrags = new Map();
        let mouseDragTarget = null;
        
        // ---------- ФИЗИКА ----------
        const FRICTION_AIR = 0.992;
        const WALL_BOUNCE_DAMP = 0.98;
        const PADDLE_HIT_FORCE = 2.2;
        const EXTRA_BOOST = 1.25;
        const MAX_SPEED = 19;
        const TOP_BOUND = 16, BOTTOM_BOUND = CH - 16, LEFT_BOUND = 16, RIGHT_BOUND = CW - 16;
        const GOAL_WIDTH = 76, GOAL_Y_START = (CH - 76)/2, LEFT_GOAL_X = 8, RIGHT_GOAL_X = CW - 8 - 76;
        
        // UI элементы
        const menuOverlay = document.getElementById('menuOverlay');
        const gameWrapper = document.getElementById('gameWrapper');
        const coinDisplaySpan = document.getElementById('coinDisplay');
        const gameHintSpan = document.getElementById('gameHint');
        const diffPanel = document.getElementById('diffPanel');
        
        function updateCoinUI() { coinDisplaySpan.innerText = `🪙 ${coins}`; }
        
        function isHitLeft(x,y) { return Math.hypot(x-leftPaddle.x, y-leftPaddle.y) <= leftPaddle.radius+10; }
        function isHitRight(x,y) { return Math.hypot(x-rightPaddle.x, y-rightPaddle.y) <= rightPaddle.radius+10; }
        
        function moveLeftTo(x,y){
            let tx = Math.min((CW/2)-leftPaddle.radius-10, Math.max(LEFT_BOUND+leftPaddle.radius, x));
            let ty = Math.min(BOTTOM_BOUND-leftPaddle.radius, Math.max(TOP_BOUND+leftPaddle.radius, y));
            leftPaddle.x = tx; leftPaddle.y = ty;
        }
        
        function moveRightTo(x,y){
            let tx = Math.min(RIGHT_BOUND-rightPaddle.radius, Math.max((CW/2)+rightPaddle.radius+10, x));
            let ty = Math.min(BOTTOM_BOUND-rightPaddle.radius, Math.max(TOP_BOUND+rightPaddle.radius, y));
            rightPaddle.x = tx; rightPaddle.y = ty;
        }
        
        // Бот
        function updateBot(){
            if(gameMode !== 'pve') return;
            if(!gameReady) return;
            if(goalCooldown > 0) return;
            
            let predictFrames = 5;
            let futureY = puck.y + puck.vy * predictFrames;
            futureY = Math.min(BOTTOM_BOUND - rightPaddle.radius, Math.max(TOP_BOUND + rightPaddle.radius, futureY));
            let diff = futureY - rightPaddle.y;
            let speed = 0;
            switch(botDifficulty){
                case 'easy': speed = 4.8; break;
                case 'medium': speed = 8.5; break;
                case 'hard': speed = 13; break;
            }
            if(botDifficulty === 'hard' && Math.abs(diff) > 30) speed *= 1.3;
            if(Math.abs(diff) > 2.5){
                let move = Math.min(Math.abs(diff), speed);
                rightPaddle.y += Math.sign(diff) * move;
            }
            rightPaddle.y = Math.min(BOTTOM_BOUND - rightPaddle.radius, Math.max(TOP_BOUND + rightPaddle.radius, rightPaddle.y));
            if(botDifficulty === 'easy' && Math.random() < 0.04){
                rightPaddle.y += (Math.random() - 0.5) * 18;
                rightPaddle.y = Math.min(BOTTOM_BOUND - rightPaddle.radius, Math.max(TOP_BOUND + rightPaddle.radius, rightPaddle.y));
            }
        }
        
        function startNewRound(){
            leftPlayerReady = false;
            if(gameMode === 'pvp') rightPlayerReady = false;
            else rightPlayerReady = true;
            gameReady = false;
            puck.x = CW/2; puck.y = CH/2;
            puck.vx = 0; puck.vy = 0;
            leftPaddle.x = 110; leftPaddle.y = CH/2;
            rightPaddle.x = CW - 110; rightPaddle.y = CH/2;
            goalCooldown = 0;
            stuckTimer = 0;
            activeDrags.clear();
            if(gameMode === 'pvp') gameHintSpan.innerText = "👆 ОБА: нажмите на свои клюшки";
            else gameHintSpan.innerText = "👆 Коснись своей клюшки";
        }
        
        function activateGame(){
            if(gameReady) return;
            gameReady = true;
            let angle = Math.random() * Math.PI * 2;
            let spd = 4.2;
            puck.vx = Math.cos(angle)*spd;
            puck.vy = Math.sin(angle)*spd;
            stuckTimer = 0;
            gameHintSpan.innerText = "⚡ ИГРА! ⚡";
            setTimeout(()=>{ if(gameReady && gameActive) gameHintSpan.innerText = "Веди клюшку"; }, 1800);
        }
        
        function checkGameReady(){
            if(!gameActive) return;
            if(!gameReady && leftPlayerReady && (gameMode==='pvp' ? rightPlayerReady : true)){
                activateGame();
            }
        }
        
        function awardGoal(scoredByLeft){
            if(goalCooldown>0) return;
            if(!gameActive) return;
            goalCooldown = GOAL_COOLDOWN_MAX;
            if(scoredByLeft) leftRounds++;
            else rightRounds++;
            coins += 3;
            updateCoinUI();
            
            if(leftRounds >= MAX_ROUNDS || rightRounds >= MAX_ROUNDS){
                matchWinner = leftRounds >= MAX_ROUNDS ? 'left' : 'right';
                let winCoins = 25;
                coins += winCoins;
                updateCoinUI();
                let winnerName = (matchWinner === 'left') ? 'ИГРОК' : (gameMode==='pvp' ? 'ИГРОК 2' : 'БОТ');
                gameHintSpan.innerText = `🏆 ПОБЕДА: ${winnerName}! +${winCoins} 🪙`;
                gameActive = false;
                gameReady = false;
                return;
            }
            currentRoundNumber++;
            startNewRound();
            gameHintSpan.innerText = `⚡ РАУНД ${currentRoundNumber}! ГОЛ! +3 🪙`;
            setTimeout(()=> { 
                if(!gameActive) return; 
                if(!gameReady) gameHintSpan.innerText = gameMode==='pvp' ? "Оба коснитесь клюшек" : "Коснись клюшки"; 
            }, 1500);
        }
        
        function checkGoal(){
            if(goalCooldown>0) return;
            if(!gameReady) return;
            const puckL = puck.x-puck.radius, puckR = puck.x+puck.radius, puckT = puck.y-puck.radius, puckB = puck.y+puck.radius;
            if(puckL <= LEFT_GOAL_X+14 && puckR >= LEFT_GOAL_X && puckB >= GOAL_Y_START && puckT <= GOAL_Y_START+GOAL_WIDTH){
                awardGoal(false);
                return;
            }
            if(puckR >= RIGHT_GOAL_X && puckL <= RIGHT_GOAL_X+GOAL_WIDTH && puckB >= GOAL_Y_START && puckT <= GOAL_Y_START+GOAL_WIDTH){
                awardGoal(true);
                return;
            }
        }
        
        function updatePhysics(){
            if(goalCooldown>0){ goalCooldown--; return; }
            if(!gameReady) return;
            puck.x += puck.vx; puck.y += puck.vy;
            puck.vx *= FRICTION_AIR; puck.vy *= FRICTION_AIR;
            let spd = Math.hypot(puck.vx, puck.vy);
            if(spd > MAX_SPEED){ puck.vx = puck.vx/spd*MAX_SPEED; puck.vy = puck.vy/spd*MAX_SPEED; }
            const inLeftGoal = (puck.y+puck.radius >= GOAL_Y_START && puck.y-puck.radius <= GOAL_Y_START+GOAL_WIDTH);
            const inRightGoal = (puck.y+puck.radius >= GOAL_Y_START && puck.y-puck.radius <= GOAL_Y_START+GOAL_WIDTH);
            if(puck.y-puck.radius <= TOP_BOUND){ puck.y = TOP_BOUND+puck.radius+1; puck.vy = -puck.vy*WALL_BOUNCE_DAMP; }
            if(puck.y+puck.radius >= BOTTOM_BOUND){ puck.y = BOTTOM_BOUND-puck.radius-1; puck.vy = -puck.vy*WALL_BOUNCE_DAMP; }
            if(puck.x-puck.radius <= LEFT_BOUND && !inLeftGoal){ puck.x = LEFT_BOUND+puck.radius+1; puck.vx = -puck.vx*WALL_BOUNCE_DAMP; }
            if(puck.x+puck.radius >= RIGHT_BOUND && !inRightGoal){ puck.x = RIGHT_BOUND-puck.radius-1; puck.vx = -puck.vx*WALL_BOUNCE_DAMP; }
            puck.x = Math.min(Math.max(puck.x, LEFT_BOUND+puck.radius), RIGHT_BOUND-puck.radius);
            puck.y = Math.min(Math.max(puck.y, TOP_BOUND+puck.radius), BOTTOM_BOUND-puck.radius);
        }
        
        function collidePaddle(paddle){
            let dx = puck.x-paddle.x, dy = puck.y-paddle.y, dist = Math.hypot(dx,dy), minD = puck.radius+paddle.radius;
            if(dist < minD){
                let angle = Math.atan2(dy,dx);
                let overlap = minD-dist;
                puck.x += Math.cos(angle)*(overlap+2.5); puck.y += Math.sin(angle)*(overlap+2.5);
                let nx = dx/dist, ny = dy/dist, vdotn = puck.vx*nx + puck.vy*ny;
                if(vdotn < 0){ let impulse = (1+PADDLE_HIT_FORCE)*vdotn; puck.vx -= impulse*nx; puck.vy -= impulse*ny; }
                puck.vx *= EXTRA_BOOST; puck.vy *= EXTRA_BOOST;
                let spdL = Math.hypot(puck.vx, puck.vy);
                if(spdL > MAX_SPEED){ puck.vx = puck.vx/spdL*MAX_SPEED; puck.vy = puck.vy/spdL*MAX_SPEED; }
                resetStuckTimer();
                return true;
            }
            return false;
        }
        
        // ========== ОТРИСОВКА С ПОЛУПРОЗРАЧНЫМ СЧЁТОМ ==========
        function draw(){
            // Лёд
            ctx.fillStyle = "#c1e2d4";
            ctx.fillRect(0,0,CW,CH);
            
            // Разметка
            ctx.strokeStyle = "#eefaf4";
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(CW/2,8); ctx.lineTo(CW/2,CH-8); ctx.stroke();
            ctx.beginPath(); ctx.arc(CW/2,CH/2,45,0,Math.PI*2); ctx.stroke();
            
            // Ворота
            ctx.fillStyle = "#aac7bbaa";
            ctx.fillRect(LEFT_GOAL_X-5, GOAL_Y_START-5, GOAL_WIDTH+10, GOAL_WIDTH+10);
            ctx.fillStyle = "#e7cfa1";
            ctx.fillRect(LEFT_GOAL_X, GOAL_Y_START, GOAL_WIDTH, GOAL_WIDTH);
            ctx.fillRect(RIGHT_GOAL_X, GOAL_Y_START, GOAL_WIDTH, GOAL_WIDTH);
            
            // Клюшки
            ctx.fillStyle = "#c2813a";
            ctx.beginPath(); ctx.arc(leftPaddle.x, leftPaddle.y, leftPaddle.radius,0,Math.PI*2); ctx.fill();
            ctx.fillStyle = "#3f7b6b";
            ctx.beginPath(); ctx.arc(rightPaddle.x, rightPaddle.y, rightPaddle.radius,0,Math.PI*2); ctx.fill();
            
            // Шайба
            if(!gameReady && goalCooldown===0 && gameActive){ 
                ctx.globalAlpha=0.4; ctx.fillStyle="#888"; ctx.beginPath(); ctx.arc(puck.x,puck.y,puck.radius,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1; 
            } else { 
                ctx.fillStyle = "#111"; ctx.shadowBlur=4; ctx.beginPath(); ctx.arc(puck.x,puck.y,puck.radius,0,Math.PI*2); ctx.fill(); 
                ctx.fillStyle="#aaa"; ctx.beginPath(); ctx.arc(puck.x-2,puck.y-2,puck.radius-5,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0; 
            }
            
            // Индикаторы готовности
            ctx.font = "bold 16px system-ui"; 
            ctx.fillStyle = leftPlayerReady?"#a5ffb0":"#ffaa88"; 
            ctx.fillText(leftPlayerReady?"✅":"⭕", leftPaddle.x-22, leftPaddle.y-22);
            if(gameMode==='pvp'){ 
                ctx.fillStyle = rightPlayerReady?"#a5ffb0":"#ffaa88"; 
                ctx.fillText(rightPlayerReady?"✅":"⭕", rightPaddle.x+12, rightPaddle.y-22); 
            } else {
                ctx.fillStyle = "#ffd966"; ctx.font = "bold 11px monospace"; 
                ctx.fillText("🤖", rightPaddle.x-5, rightPaddle.y-20);
            }
            
            // ========== ПОЛУПРОЗРАЧНЫЙ СЧЁТ НА ПОЛЕ ==========
            ctx.font = "bold 32px 'Segoe UI'";
            ctx.shadowBlur = 0;
            ctx.fillStyle = "rgba(0, 0, 0, 0.65)";
            ctx.fillText(`${leftRounds}`, 35, 55);
            ctx.fillText(`${rightRounds}`, CW - 65, 55);
            ctx.fillStyle = "rgba(255, 242, 201, 0.9)";
            ctx.fillText(`${leftRounds}`, 33, 53);
            ctx.fillText(`${rightRounds}`, CW - 67, 53);
            
            // Номер раунда (полупрозрачный в центре вверху)
            ctx.font = "bold 14px system-ui";
            ctx.fillStyle = "rgba(0,0,0,0.6)";
            ctx.fillText(`РАУНД ${currentRoundNumber}/${MAX_ROUNDS}`, CW/2-45, 28);
            ctx.fillStyle = "#ffd966cc";
            ctx.fillText(`РАУНД ${currentRoundNumber}/${MAX_ROUNDS}`, CW/2-46, 27);
            
            // Монеты в углу (полупрозрачно)
            ctx.font = "bold 14px monospace";
            ctx.fillStyle = "rgba(0,0,0,0.6)";
            ctx.fillText(`🪙 ${coins}`, CW-70, CH-12);
            ctx.fillStyle = "#ffd966dd";
            ctx.fillText(`🪙 ${coins}`, CW-71, CH-13);
        }
        
        // ---------- ОБРАБОТЧИКИ КАСАНИЙ ----------
        function onTouchStart(e){
            e.preventDefault();
            for(let i=0; i<e.touches.length; i++){
                let t=e.touches[i], rect=canvas.getBoundingClientRect(), sx=canvas.width/rect.width, sy=canvas.height/rect.height;
                let x=(t.clientX-rect.left)*sx, y=(t.clientY-rect.top)*sy;
                x=Math.min(Math.max(x,0),CW); y=Math.min(Math.max(y,0),CH);
                if(isHitLeft(x,y) && gameActive){
                    if(!activeDrags.has(t.identifier)) activeDrags.set(t.identifier,{target:'left'});
                    if(!leftPlayerReady && !gameReady && gameActive){ leftPlayerReady=true; checkGameReady(); }
                    moveLeftTo(x,y);
                }
                else if(gameMode==='pvp' && isHitRight(x,y) && gameActive){
                    if(!activeDrags.has(t.identifier)) activeDrags.set(t.identifier,{target:'right'});
                    if(!rightPlayerReady && !gameReady && gameActive){ rightPlayerReady=true; checkGameReady(); }
                    moveRightTo(x,y);
                }
            }
        }
        function onTouchMove(e){
            e.preventDefault();
            for(let i=0; i<e.touches.length; i++){
                let t=e.touches[i], drag=activeDrags.get(t.identifier); if(!drag) continue;
                let rect=canvas.getBoundingClientRect(), sx=canvas.width/rect.width, sy=canvas.height/rect.height;
                let x=(t.clientX-rect.left)*sx, y=(t.clientY-rect.top)*sy;
                x=Math.min(Math.max(x,0),CW); y=Math.min(Math.max(y,0),CH);
                if(drag.target==='left') moveLeftTo(x,y);
                else if(drag.target==='right') moveRightTo(x,y);
            }
        }
        function onTouchEnd(e){
            e.preventDefault();
            for(let i=0; i<e.changedTouches.length; i++) activeDrags.delete(e.changedTouches[i].identifier);
        }
        
        // Мышь
        let mouseDown=false, mouseTarget=null;
        function onMouseMove(e){
            if(!mouseDown) return;
            let rect=canvas.getBoundingClientRect(), sx=canvas.width/rect.width, sy=canvas.height/rect.height;
            let x=(e.clientX-rect.left)*sx, y=(e.clientY-rect.top)*sy;
            x=Math.min(Math.max(x,0),CW); y=Math.min(Math.max(y,0),CH);
            if(mouseTarget==='left') moveLeftTo(x,y);
            else if(mouseTarget==='right') moveRightTo(x,y);
        }
        function onMouseDown(e){
            e.preventDefault();
            let rect=canvas.getBoundingClientRect(), sx=canvas.width/rect.width, sy=canvas.height/rect.height;
            let x=(e.clientX-rect.left)*sx, y=(e.clientY-rect.top)*sy;
            x=Math.min(Math.max(x,0),CW); y=Math.min(Math.max(y,0),CH);
            if(isHitLeft(x,y) && gameActive){
                mouseTarget='left'; mouseDown=true;
                if(!leftPlayerReady && !gameReady && gameActive){ leftPlayerReady=true; checkGameReady(); }
                moveLeftTo(x,y);
            } else if(gameMode==='pvp' && isHitRight(x,y) && gameActive){
                mouseTarget='right'; mouseDown=true;
                if(!rightPlayerReady && !gameReady && gameActive){ rightPlayerReady=true; checkGameReady(); }
                moveRightTo(x,y);
            }
        }
        function onMouseUp(){ mouseDown=false; mouseTarget=null; }
        
        function startGame(mode, diff){
            gameMode = mode;
            botDifficulty = diff;
            leftRounds = 0; rightRounds = 0; currentRoundNumber = 1; matchWinner = null; gameActive = true;
            if(gameMode === 'pvp') rightPlayerReady = false;
            else rightPlayerReady = true;
            leftPlayerReady = false; gameReady = false;
            startNewRound();
            if(gameMode === 'pvp') gameHintSpan.innerText = "👆 Оба коснитесь своих клюшек";
            else gameHintSpan.innerText = "👆 Коснись своей клюшки";
            menuOverlay.style.display = 'none';
            gameWrapper.style.display = 'flex';
        }
        
        // Меню
        document.querySelectorAll('[data-mode]').forEach(btn=>{
            btn.addEventListener('click', (e)=>{
                let mode = btn.getAttribute('data-mode');
                if(mode === 'pve') diffPanel.style.display = 'flex';
                else { diffPanel.style.display = 'none'; startGame('pvp', 'medium'); }
            });
        });
        document.querySelectorAll('[data-diff]').forEach(btn=>{
            btn.addEventListener('click', ()=>{
                let diff = btn.getAttribute('data-diff');
                document.querySelectorAll('[data-diff]').forEach(b=>b.classList.remove('active-diff'));
                btn.classList.add('active-diff');
                startGame('pve', diff);
            });
        });
        document.getElementById('closeMenuBtn').addEventListener('click', ()=>{
            if(gameMode === 'pve' && diffPanel.style.display !== 'flex') diffPanel.style.display = 'flex';
            else if(gameMode === 'pvp') startGame('pvp', 'medium');
        });
        document.getElementById('inGameReset').addEventListener('click', ()=>{
            leftRounds=0; rightRounds=0; currentRoundNumber=1; gameActive=true; matchWinner=null;
            startNewRound();
            if(gameMode === 'pvp') rightPlayerReady = false; else rightPlayerReady = true;
            leftPlayerReady=false; gameReady=false;
            gameHintSpan.innerText = gameMode==='pvp' ? "Оба коснитесь клюшек" : "Коснись клюшки";
        });
        
        function gameLoop(){
            updateBot();
            updatePhysics();
            if(gameReady) collidePaddle(leftPaddle);
            if(gameReady && gameMode === 'pvp') collidePaddle(rightPaddle);
            else if(gameReady && gameMode === 'pve') collidePaddle(rightPaddle);
            checkGoal();
            checkStuckPuck();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        canvas.addEventListener('touchstart', onTouchStart, {passive:false});
        canvas.addEventListener('touchmove', onTouchMove, {passive:false});
        canvas.addEventListener('touchend', onTouchEnd);
        canvas.addEventListener('mousedown', onMouseDown);
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);
        
        function checkOrientation(){ document.getElementById('orientWarn').style.display = (window.innerHeight > window.innerWidth) ? 'flex' : 'none'; }
        window.addEventListener('resize', checkOrientation);
        checkOrientation();
        
        gameLoop();
        updateCoinUI();
    })();
</script>
</body>
</html>
